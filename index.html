<!DOCTYPE html><html lang="fr"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>CHOK'BETON — Rapport Chantier</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1E2D35">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CHOK'BETON">
<link rel="apple-touch-icon" href="icon.svg">
<style>
:root{--y:#F5C400;--dk:#1E2D35;--bg:#f1f5f9;--card:#fff;--text:#0f172a;--mut:#64748b;--brd:#e2e8f0;--r:12px;--sh:0 1px 4px rgba(0,0,0,.1);--ov:#7c3aed}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:16px}
.app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.hdr{background:var(--dk);color:#fff;padding:12px 16px 0;position:sticky;top:0;z-index:50;box-shadow:0 2px 8px rgba(0,0,0,.35)}
.hdr-row{display:flex;align-items:center;gap:10px;padding-bottom:10px}
.hdr-info{flex:1}
.hdr-title{font-size:16px;font-weight:900;color:#fff}
.hdr-step{font-size:11px;color:var(--y);font-weight:700}
.steps-bar{display:flex;gap:5px;padding-bottom:9px}
.sd{flex:1;height:3px;border-radius:2px;background:rgba(255,255,255,.18);transition:background .3s}
.sd.on{background:var(--y)}.sd.was{background:rgba(245,196,0,.55)}
.body{flex:1;padding:14px;overflow-y:auto;padding-bottom:88px}
.card{background:var(--card);border-radius:var(--r);padding:14px;margin-bottom:11px;box-shadow:var(--sh)}
.ct{font-size:11px;font-weight:900;color:var(--dk);text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.ct::after{content:'';flex:1;height:1px;background:var(--brd)}
.f{margin-bottom:12px}.f:last-child{margin-bottom:0}
label{display:block;font-size:12px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px}
input,select,textarea{width:100%;padding:11px 13px;border:1.5px solid var(--brd);border-radius:8px;font-size:16px;color:var(--text);background:#fff;-webkit-appearance:none;transition:border-color .2s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--dk);box-shadow:0 0 0 3px rgba(30,45,53,.1)}
textarea{resize:vertical;min-height:70px}
.row{display:flex;gap:9px}.row .f{flex:1}
.btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:13px 16px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;border:none;transition:all .15s;min-height:50px}
.btn-p{background:var(--dk);color:#fff}.btn-p:active{opacity:.85;transform:scale(.97)}
.btn-y{background:var(--y);color:var(--dk)}.btn-y:active{opacity:.85}
.btn-o{background:transparent;color:var(--dk);border:2px solid var(--dk)}
.btn-wa{background:#25D366;color:#fff}.btn-wa:disabled{opacity:.6;cursor:not-allowed}
.btn-sm{padding:8px 13px;font-size:13px;min-height:36px;width:auto}
.bot{padding:12px 14px;background:#fff;border-top:1px solid var(--brd);display:flex;gap:9px;position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;z-index:40}
/* Blocs */
.bloc{background:#fff;border:1.5px solid var(--brd);border-radius:12px;margin-bottom:12px;overflow:hidden;box-shadow:var(--sh)}
.bloc-hdr{background:var(--dk);padding:10px 14px;display:flex;align-items:center;gap:8px}
.bloc-niv{background:var(--y);color:var(--dk);font-size:13px;font-weight:900;padding:4px 12px;border-radius:20px;white-space:nowrap}
.bloc-title{color:#fff;font-size:13px;font-weight:700;flex:1}
.bloc-del{background:none;border:none;color:rgba(255,255,255,.6);font-size:18px;cursor:pointer;padding:2px}
.bloc-body{padding:12px 14px}
.work-row{display:flex;align-items:flex-start;gap:6px;padding:6px 0;border-bottom:1px solid var(--brd)}
.work-row:last-child{border-bottom:none}
.work-ico{font-size:15px;flex-shrink:0;margin-top:1px}
.work-txt{font-size:13px;flex:1;line-height:1.5}
.work-supp{font-size:11px;font-weight:700;padding:2px 7px;border-radius:10px;flex-shrink:0;margin-top:1px}
.supp-p{background:#fef3c7;color:#92400e}
.supp-v{background:#e0f2fe;color:#0369a1}
/* Responsables */
.rgrid{display:flex;flex-direction:column;gap:9px}
.rc{border:2px solid var(--brd);border-radius:10px;padding:13px 15px;cursor:pointer;background:#fff;transition:all .15s;display:flex;align-items:center;gap:12px}
.rc.sel{border-color:var(--dk);background:#f0f4f5}
.rc-av{width:40px;height:40px;border-radius:50%;background:var(--y);color:var(--dk);font-size:17px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.rc.sel .rc-av{background:var(--dk);color:#fff}
.rc-info{flex:1}.rc-name{font-size:15px;font-weight:800;color:var(--dk)}.rc-sub{font-size:12px;color:#25D366;font-weight:600}
/* Niveaux */
.ngrid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.nb{padding:9px 3px;border:2px solid var(--brd);border-radius:8px;background:#fff;font-size:12px;font-weight:700;cursor:pointer;text-align:center;transition:all .12s}
.nb.sel{border-color:var(--dk);background:var(--y);color:var(--dk)}
/* Modal */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .25s}
.ov.show{opacity:1;pointer-events:all}
.modal{background:#fff;border-radius:20px 20px 0 0;width:100%;max-height:95vh;overflow-y:auto;transform:translateY(100%);transition:transform .3s ease}
.ov.show .modal{transform:translateY(0)}
.mhandle{width:34px;height:4px;background:#e2e8f0;border-radius:2px;margin:11px auto}
.msection{padding:0 14px;margin-bottom:4px}
.msection-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 0 8px;border-bottom:2px solid var(--y);margin-bottom:10px}
.msection-title{font-size:14px;font-weight:900;color:var(--dk)}
.add-btn{background:var(--y);color:var(--dk);border:none;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:800;cursor:pointer}
.add-btn-ov{background:#ede9fe;color:var(--ov);border:none;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:800;cursor:pointer}
/* Lignes carottage */
.car-line{background:#f8fafc;border:1.5px solid var(--brd);border-radius:10px;padding:10px;margin-bottom:8px}
.car-line-top{display:flex;align-items:center;gap:7px;margin-bottom:8px}
.car-line-top select{flex:1;padding:8px;font-size:14px;font-weight:700;border-radius:7px;border:1.5px solid var(--brd)}
.counter{display:flex;align-items:center;border:1.5px solid var(--brd);border-radius:8px;overflow:hidden;flex-shrink:0}
.counter button{width:34px;height:36px;border:none;background:#f0f0f0;font-size:20px;font-weight:700;cursor:pointer;color:var(--dk)}
.counter button:active{background:var(--y)}
.counter input{width:38px;border:none;text-align:center;font-size:15px;font-weight:800;padding:0}
.car-line-bot{display:flex;align-items:center;gap:7px}
.ep-in{width:80px;padding:7px 8px;border:1.5px solid var(--brd);border-radius:7px;font-size:13px;text-align:center;flex-shrink:0}
.mini-supp{display:flex;gap:6px;flex:1}
.ms{flex:1;padding:7px 4px;border:2px solid var(--brd);border-radius:7px;background:#fff;font-size:12px;font-weight:700;cursor:pointer;text-align:center;transition:all .1s}
.ms.sel-p{border-color:#d97706;background:#fef3c7;color:#92400e}
.ms.sel-v{border-color:#0284c7;background:#e0f2fe;color:#0369a1}
.del-btn{background:none;border:none;color:#ef4444;font-size:18px;cursor:pointer;flex-shrink:0}
/* Lignes sciage / carbone */
.sci-line{background:#f8fafc;border:1.5px solid var(--brd);border-radius:10px;padding:10px;margin-bottom:8px}
.sci-line-row{display:flex;align-items:center;gap:7px;margin-bottom:7px}
.sci-in{flex:1;padding:8px;border:1.5px solid var(--brd);border-radius:7px;font-size:14px}
/* Ouverture */
.ouv-line{background:#faf5ff;border:1.5px solid #ddd6fe;border-left:4px solid var(--ov);border-radius:10px;padding:10px;margin-bottom:8px}
.ouv-dim{display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.ouv-dim input{width:72px;padding:7px 6px;border:1.5px solid var(--brd);border-radius:7px;font-size:14px;text-align:center;flex-shrink:0}
.ouv-dim input.haut{border-color:var(--ov);background:#ede9fe}
.ouv-cars{margin-top:6px}
.ouv-car-row{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.ouv-car-row select{flex:1;padding:7px;font-size:13px;font-weight:700;border-radius:7px;border:1.5px solid var(--brd)}
.ouv-add{background:#ede9fe;color:var(--ov);border:none;border-radius:7px;padding:5px 10px;font-size:12px;font-weight:800;cursor:pointer;margin-top:3px}
.ep-sm{width:62px;padding:6px;border:1.5px solid var(--brd);border-radius:7px;font-size:12px;text-align:center;flex-shrink:0}
/* Support toggle */
.srow{display:flex;gap:9px}
.sb{flex:1;padding:11px;border:2px solid var(--brd);border-radius:8px;background:#fff;font-size:14px;font-weight:700;cursor:pointer;text-align:center;transition:all .12s}
.sb.sel{border-color:var(--dk);background:var(--y);color:var(--dk)}
/* Signature */
#sigc{width:100%;height:160px;border:2px solid var(--brd);border-radius:8px;touch-action:none;background:#fafafa;display:block;cursor:crosshair}
.empty{text-align:center;padding:36px 16px;color:var(--mut)}
.empty .e-ico{font-size:44px;margin-bottom:10px}
.info-box{background:#f0fdf4;border:1px solid #86efac;border-radius:8px;padding:11px 13px;font-size:13px;color:#166534}
hr{border:none;border-top:1px solid var(--brd);margin:12px 0}
/* Photos */
.photo-upload{border:2px dashed var(--brd);border-radius:10px;padding:18px;text-align:center;cursor:pointer;background:#fafafa}
.photo-upload input[type=file]{display:none}
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
.photo-item{position:relative;border-radius:8px;overflow:hidden;aspect-ratio:1;background:#f1f5f9}
.photo-item img{width:100%;height:100%;object-fit:cover;display:block}
.photo-item .ph-del{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.65);color:#fff;border:none;border-radius:50%;width:22px;height:22px;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.photo-item .ph-cap{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.55);padding:3px 5px}
.photo-item .ph-cap input{background:transparent;border:none;color:#fff;font-size:10px;width:100%;padding:0;outline:none}
</style></head>
<body>
<div class="app" id="app"></div>
<div class="ov" id="ov"><div class="modal" id="modal"></div></div>
<script>
// ── CONFIG ──
const EQUIPE=[
  {id:'christopher',nom:'Christopher',tel:'33XXXXXXXXX'},
  {id:'christian',  nom:'Christian',  tel:'33XXXXXXXXX'},
  {id:'ghislain',   nom:'Ghislain',   tel:'33XXXXXXXXX'}
];
const NIVEAUX=['SS3','SS2','SS1','RDC','RDJ','R+1','R+2','R+3','R+4','R+5','R+6','R+7','R+8','R+9','R+10','Toiture'];
const DIAMS=[40,50,60,70,80,100,110,120,130,150,160,200,220,250,300,320,350,400,'Autre'];
const CB_TYPES=['S512','S812','S1012','S1512','WRAP'];
const LOGO=(h=42)=>`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 240" height="${h}"><g transform="translate(110,100)"><circle cx="0" cy="0" r="76" fill="#F5C400"/>${Array.from({length:28},(_,i)=>{const a=i*360/28,c=x=>Math.cos(x*Math.PI/180),s=y=>Math.sin(y*Math.PI/180);return`<polygon points="${76*c(a-4)},${76*s(a-4)} ${88*c(a)},${88*s(a)} ${76*c(a+4)},${76*s(a+4)}" fill="#F5C400"/>`;}).join('')}<rect x="-28" y="-32" width="56" height="64" rx="3" fill="#1E2D35"/><polygon points="-20,-24 20,-24 20,-14 -8,14 20,14 20,24 -20,24 -20,14 8,-14 -20,-14" fill="white"/><polygon points="0,-24 20,-24 20,-14 0,-14" fill="#1E2D35"/><polygon points="-20,14 0,14 0,24 -20,24" fill="#1E2D35"/></g><text x="110" y="200" text-anchor="middle" font-family="Arial Black,sans-serif" font-weight="900" font-size="26" fill="#1E2D35" letter-spacing="1">CHOK'BETON</text><rect x="20" y="212" width="180" height="4" rx="2" fill="#F5C400"/></svg>`;

// ── STATE ──
const S={
  step:1,
  info:{date:new Date().toISOString().slice(0,10),num:'',addr:'',client:'',tech:'',date_debut:'',date_fin:''},
  blocs:[],resp:'',photos:[],
  sig:{url:'',name:''},
  m:{open:false,editId:null,niveau:'',obs:'',
     carottages:[],sciages:[],carbones:[],ouvertures:[],autres:''}
};
let uid=1,sc,sx,drawing=false;

// ── PERSISTENCE ──
function saveState(){try{localStorage.setItem('cb_rapport',JSON.stringify({info:S.info,blocs:S.blocs,resp:S.resp,sig:{name:S.sig.name},step:S.step}));}catch(e){}}
function loadState(){try{const d=localStorage.getItem('cb_rapport');if(!d)return;const p=JSON.parse(d);if(p.info)Object.assign(S.info,p.info);if(p.blocs)S.blocs=p.blocs;if(p.resp)S.resp=p.resp;if(p.sig?.name)S.sig.name=p.sig.name;if(p.step)S.step=p.step;const mx=S.blocs.reduce((a,b)=>Math.max(a,parseInt(b.id)||0),0);uid=mx+1;}catch(e){}}
function resetState(){if(!confirm('Démarrer un nouveau rapport ?\nLe rapport actuel sera effacé.'))return;localStorage.removeItem('cb_rapport');location.reload();}

// ── RENDER ──
function R(){document.getElementById('app').innerHTML=hdr()+content()+bot();events();renderModal();saveState();}

function hdr(){
  const labs=['','Infos Chantier','Travaux par niveau','Photos & Signature'];
  return`<div class="hdr"><div class="hdr-row">
    <div style="height:38px;display:flex;align-items:center">${LOGO(38)}</div>
    <div class="hdr-info">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div class="hdr-title">Rapport de Chantier</div>
        <button onclick="resetState()" style="background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:7px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer">✚ Nouveau</button>
      </div>
      <div class="hdr-step">${labs[S.step]} — Étape ${S.step}/3</div>
    </div>
  </div>
  <div class="steps-bar">${[1,2,3].map(i=>`<div class="sd ${i<S.step?'was':''} ${i===S.step?'on':''}"></div>`).join('')}</div></div>`;
}
function content(){return`<div class="body">${S.step===1?step1():S.step===2?step2():step3()}</div>`;}

// ── ÉTAPE 1 ──
function step1(){
  const c=S.info;
  return`<div class="card"><div class="ct">📅 Informations générales</div>
    <div class="f"><label>Date du rapport</label><input type="date" id="f-date" value="${c.date}"></div>
    <div class="f"><label>N° de rapport</label><input type="text" id="f-num" value="${c.num}" placeholder="Ex : 2025-001"></div>
    <div class="row">
      <div class="f"><label>Début chantier</label><input type="date" id="f-date-debut" value="${c.date_debut}"></div>
      <div class="f"><label>Fin chantier</label><input type="date" id="f-date-fin" value="${c.date_fin}"></div>
    </div>
  </div>
  <div class="card"><div class="ct">📍 Chantier</div>
    <div class="f"><label>Adresse / Nom du chantier</label><input type="text" id="f-addr" value="${c.addr}" placeholder="12 rue de la Paix, Paris"></div>
    <div class="f"><label>Client</label><input type="text" id="f-client" value="${c.client}" placeholder="Nom du client"></div>
  </div>
  <div class="card"><div class="ct">👷 Intervenant</div>
    <div class="f"><label>Nom du technicien</label><input type="text" id="f-tech" value="${c.tech}" placeholder="Prénom Nom"></div>
  </div>`;
}

// ── ÉTAPE 2 ──
function step2(){
  if(!S.blocs.length) return`<div class="empty"><div class="e-ico">🏗️</div><p>Aucun niveau saisi.<br>Appuyez sur <strong>+ Ajouter un niveau</strong> pour commencer.</p></div>`;
  return S.blocs.map(b=>blocHtml(b)).join('');
}

function diamLbl(d,dc){return d==='Autre'?(dc?`Ø${dc}mm`:'Ø?mm'):`Ø${d}mm`;}

function blocHtml(b){
  const rows=[];
  (b.carottages||[]).forEach(l=>{
    const sup=l.supp==='plancher'?'<span class="work-supp supp-p">Plancher</span>':'<span class="work-supp supp-v">Voile</span>';
    const hi=l.supp==='voile'&&l.haut?` <span style="font-size:11px;color:#0369a1">↕${l.haut}ml</span>`:'';
    rows.push(`<div class="work-row"><span class="work-ico">🔩</span><span class="work-txt"><b>${l.nb}×</b> ${diamLbl(l.diam,l.diamCustom)}${l.ep?' — ép.'+l.ep+'cm':''}${hi}</span>${sup}</div>`);
  });
  (b.sciages||[]).forEach(l=>{
    const sup=l.supp==='plancher'?'<span class="work-supp supp-p">Plancher</span>':'<span class="work-supp supp-v">Voile</span>';
    const hi=l.supp==='voile'&&l.haut?` <span style="font-size:11px;color:#0369a1">↕${l.haut}ml</span>`:'';
    rows.push(`<div class="work-row"><span class="work-ico">🪚</span><span class="work-txt"><b>${l.ml}ml</b>${l.prof?' — prof.'+l.prof+'cm':''}${hi}</span>${sup}</div>`);
  });
  (b.carbones||[]).forEach(l=>{
    rows.push(`<div class="work-row"><span class="work-ico">🏗️</span><span class="work-txt"><b>${l.nbl} lamelle(s)</b> × ${l.ll}ml${l.type?' — <b>'+l.type+'</b>':''} — ${l.ori}</span></div>`);
  });
  (b.ouvertures||[]).forEach(o=>{
    const dim=o.larg&&o.long?`${o.larg}×${o.long}cm`:'—';
    const cars=(o.carottages||[]).filter(c=>c.nb>0).map(c=>`${c.nb}× ${diamLbl(c.diam,c.diamCustom)}${c.ep?' ép.'+c.ep+'cm':''}`).join(', ');
    const hi=o.haut?` — ↕${o.haut}ml`:'';
    rows.push(`<div class="work-row"><span class="work-ico">🔲</span><span class="work-txt" style="color:var(--ov)"><b>Ouverture ${dim}</b></span></div>`);
    if(cars) rows.push(`<div class="work-row" style="padding-left:22px"><span class="work-ico" style="font-size:12px">↳</span><span class="work-txt">${cars}${hi}</span></div>`);
  });
  if(b.autres) rows.push(`<div class="work-row"><span class="work-ico">📝</span><span class="work-txt">${b.autres}</span></div>`);
  if(b.obs)    rows.push(`<div class="work-row"><span class="work-ico">💬</span><span class="work-txt">${b.obs}</span></div>`);
  const total=(b.carottages||[]).length+(b.sciages||[]).length+(b.carbones||[]).length+(b.ouvertures||[]).length+(b.autres?1:0);
  return`<div class="bloc">
    <div class="bloc-hdr">
      <span class="bloc-niv">📍 ${b.niveau||'—'}</span>
      <span class="bloc-title">${total} travaux réalisé${total>1?'s':''}</span>
      <button class="bloc-del" onclick="editBloc('${b.id}')" style="font-size:16px;margin-right:2px">✏️</button>
      <button class="bloc-del" onclick="delBloc('${b.id}')">🗑</button>
    </div>
    <div class="bloc-body">${rows.join('')||'<p style="color:var(--mut);font-size:13px">Aucun travail</p>'}</div>
  </div>`;
}

// ── ÉTAPE 3 ──
function step3(){
  const blocs=S.blocs;
  let totCar=0,totSci=0,totCb=0,totOuv=0;
  blocs.forEach(b=>{
    (b.carottages||[]).forEach(l=>totCar+=parseInt(l.nb||0));
    (b.sciages||[]).forEach(l=>totSci+=parseFloat(l.ml||0));
    (b.carbones||[]).forEach(l=>totCb+=parseInt(l.nbl||0));
    totOuv+=(b.ouvertures||[]).length;
  });
  const rows=[];
  if(totCar>0)  rows.push(`🔩 Carottage — ${totCar} carottage(s)`);
  if(totSci>0)  rows.push(`🪚 Sciage — ${totSci} ml`);
  if(totCb>0)   rows.push(`🏗️ ${totCb} lamelle(s) carbone`);
  if(totOuv>0)  rows.push(`🔲 ${totOuv} ouverture(s) par carottages`);
  const recap=rows.length

function selResp(id){const sn=document.getElementById('f-signame');if(sn)S.sig.name=sn.value;if(sc)S.sig.url=sc.toDataURL();S.resp=id;R();}

function bot(){

function selNiveau(n){saveModalFields();S.m.niveau=(S.m.niveau===n?'':n);renderModal();}

function saveModalFields(){
  const m=S.m;
  const g=id=>{const e=document.getElementById(id);return e?e.value:null};
  if(g('m-obs')!==null)    m.obs=g('m-obs');
  if(g('m-autres')!==null) m.autres=g('m-autres');
  // Carottages
  (m.carottages||[]).forEach((l,i)=>{
    const s=document.querySelector(`select[onchange*="setCar(${i},'diam'"]`);
    const nb=document.querySelector(`input[onchange*="setCar(${i},'nb'"]`);
    const ep=document.querySelector(`input[onchange*="setCar(${i},'ep'"]`);
    const haut=document.querySelector(`input[onchange*="setCar(${i},'haut'"]`);
    const dc=document.querySelector(`input[onchange*="setCar(${i},'diamCustom'"]`);
    if(s)    l.diam=s.value;
    if(nb)   l.nb=Math.max(1,parseInt(nb.value)||1);
    if(ep)   l.ep=ep.value;
    if(haut) l.haut=haut.value;
    if(dc)   l.diamCustom=dc.value;
  });
  // Sciages
  (m.sciages||[]).forEach((l,i)=>{
    const ml=document.querySelector(`input[onchange*="setSci(${i},'ml'"]`);
    const pr=document.querySelector(`input[onchange*="setSci(${i},'prof'"]`);
    const hs=document.querySelector(`input[onchange*="setSci(${i},'haut'"]`);
    if(ml) l.ml=ml.value; if(pr) l.prof=pr.value; if(hs) l.haut=hs.value;
  });
  // Carbones
  (m.carbones||[]).forEach((l,i)=>{
    const nb=document.querySelector(`input[onchange*="setCb(${i},'nbl'"]`);
    const ll=document.querySelector(`input[onchange*="setCb(${i},'ll'"]`);
    const tp=document.querySelector(`select[onchange*="setCb(${i},'type'"]`);
    if(nb) l.nbl=nb.value; if(ll) l.ll=ll.value; if(tp) l.type=tp.value;
  });
  // Ouvertures
  (m.ouvertures||[]).forEach((o,i)=>{
    const larg=document.querySelector(`input[onchange*="setOuv(${i},'larg'"]`);
    const long=document.querySelector(`input[onchange*="setOuv(${i},'long'"]`);
    const haut=document.querySelector(`input[onchange*="setOuv(${i},'haut'"]`);
    if(larg) o.larg=larg.value;
    if(long) o.long=long.value;
    if(haut) o.haut=haut.value;
    (o.carottages||[]).forEach((c,ci)=>{
      const s=document.querySelector(`select[onchange*="setOuvCar(${i},${ci},'diam'"]`);
      const nb=document.querySelector(`input[onchange*="setOuvCar(${i},${ci},'nb'"]`);
      const ep=document.querySelector(`input[onchange*="setOuvCar(${i},${ci},'ep'"]`);
      const dc=document.querySelector(`input[onchange*="setOuvCar(${i},${ci},'diamCustom'"]`);
      if(s)  c.diam=s.value;
      if(nb) c.nb=Math.max(1,parseInt(nb.value)||1);
      if(ep) c.ep=ep.value;
      if(dc) c.diamCustom=dc.value;
    });
  });
}

// Carottages
function addCar(){saveModalFields();S.m.carottages.push({diam:100,nb:1,ep:'',supp:'',haut:'',diamCustom:''});renderModal();}
function delCar(i){saveModalFields();S.m.carottages.splice(i,1);renderModal();}
function chgCar(i,d){saveModalFields();S.m.carottages[i].nb=Math.max(1,(S.m.carottages[i].nb||1)+d);renderModal();}
function setCar(i,k,v){if(!S.m.carottages[i])return;S.m.carottages[i][k]=k==='nb'?Math.max(1,parseInt(v)||1):v;if(k==='supp'||k==='diam')renderModal();}
// Sciages
function addSci(){saveModalFields();S.m.sciages.push({ml:'',prof:'',supp:'',haut:''});renderModal();}
function delSci(i){saveModalFields();S.m.sciages.splice(i,1);renderModal();}
function setSci(i,k,v){if(!S.m.sciages[i])return;S.m.sciages[i][k]=v;if(k==='supp')renderModal();}
// Carbones
function addCb(){saveModalFields();S.m.carbones.push({type:'',nbl:'',ll:'',ori:'horizontal'});renderModal();}
function delCb(i){saveModalFields();S.m.carbones.splice(i,1);renderModal();}
function setCb(i,k,v){if(!S.m.carbones[i])return;S.m.carbones[i][k]=v;if(k==='ori')renderModal();}
// Ouvertures
function addOuv(){saveModalFields();S.m.ouvertures.push({larg:'',long:'',haut:'',carottages:[{diam:200,nb:1,ep:'',diamCustom:''}]});renderModal();}
function delOuv(i){saveModalFields();S.m.ouvertures.splice(i,1);renderModal();}
function setOuv(i,k,v){if(!S.m.ouvertures[i])return;S.m.ouvertures[i][k]=v;}
function addOuvCar(i){saveModalFields();(S.m.ouvertures[i].carottages=S.m.ouvertures[i].carottages||[]).push({diam:200,nb:1,ep:'',diamCustom:''});renderModal();}
function delOuvCar(i,ci){saveModalFields();S.m.ouvertures[i].carottages.splice(ci,1);renderModal();}
function setOuvCar(i,ci,k,v){const c=S.m.ouvertures[i]?.carottages[ci];if(!c)return;c[k]=k==='nb'?Math.max(1,parseInt(v)||1):v;if(k==='diam')renderModal();}
function chgOuvCar(i,ci,d){saveModalFields();const c=S.m.ouvertures[i]?.carottages[ci];if(c)c.nb=Math.max(1,(c.nb||1)+d);renderModal();}

function saveBloc(){
  saveModalFields();const m=S.m;
  const hasWork=(m.carottages||[]).length>0||(m.sciages||[]).length>0||(m.carbones||[]).length>0||(m.ouvertures||[]).length>0||m.autres;
  if(!hasWork){alert('Ajoutez au moins un travail.');return;}
  for(const l of m.carottages||[]){if(!l.supp){alert('Choisissez Plancher ou Voile pour chaque carottage.');return;}}
  for(const l of m.sciages||[]){if(!l.ml){alert('Saisissez la longueur pour chaque sciage.');return;}if(!l.supp){alert('Choisissez Plancher ou Voile pour chaque sciage.');return;}}
  for(const l of m.carbones||[]){if(!l.nbl||!l.ll){alert('Renseignez le nombre et la longueur pour chaque lamelle.');return;}}
  for(const o of m.ouvertures||[]){if(!o.larg||!o.long){alert('Saisissez les dimensions de chaque ouverture.');return;}if(!(o.carottages||[]).length){alert('Ajoutez au moins un carottage par ouverture.');return;}}
  const data={niveau:m.niveau||'Non précisé',obs:m.obs,autres:m.autres,
    carottages:JSON.parse(JSON.stringify(m.carottages)),
    sciages:JSON.parse(JSON.stringify(m.sciages)),
    carbones:JSON.parse(JSON.stringify(m.carbones)),
    ouvertures:JSON.parse(JSON.stringify(m.ouvertures))
  };
  if(m.editId){const idx=S.blocs.findIndex(x=>x.id===m.editId);if(idx>=0)S.blocs[idx]={...S.blocs[idx],...data};}
  else S.blocs.push({id:String(uid++),...data});
  closeM();R();
}

// ── SIGNATURE ──
function initSig(){
  const c=document.getElementById('sigc');if(!c)return;
  sc=c;sx=c.getContext('2d');sx.strokeStyle='#1E2D35';sx.lineWidth=3;sx.lineCap='round';sx.lineJoin='round';
  if(S.sig.url){const img=new Image();img.onload=()=>sx.drawImage(img,0,0,c.width,c.height);img.src=S.sig.url;}
  const pos=e=>{const r=c.getBoundingClientRect(),sw=c.width/r.width,sh=c.height/r.height,s=e.touches?e.touches[0]:e;return{x:(s.clientX-r.left)*sw,y:(s.clientY-r.top)*sh};};
  c.addEventListener('mousedown',e=>{e.preventDefault();drawing=true;const p=pos(e);sx.beginPath();sx.moveTo(p.x,p.y);});
  c.addEventListener('mousemove',e=>{if(!drawing)return;e.preventDefault();const p=pos(e);sx.lineTo(p.x,p.y);sx.stroke();});
  c.addEventListener('mouseup',()=>{drawing=false;if(sc)S.sig.url=sc.toDataURL();});
  c.addEventListener('touchstart',e=>{e.preventDefault();drawing=true;const p=pos(e);sx.beginPath();sx.moveTo(p.x,p.y);},{passive:false});
  c.addEventListener('touchmove',e=>{if(!drawing)return;e.preventDefault();const p=pos(e);sx.lineTo(p.x,p.y);sx.stroke();},{passive:false});
  c.addEventListener('touchend',()=>{drawing=false;if(sc)S.sig.url=sc.toDataURL();});
}
function clearSig(){if(sc&&sx){sx.clearRect(0,0,sc.width,sc.height);S.sig.url='';}}

function events(){
  if(S.step===1){
    [['date','date'],['num','num'],['addr','addr'],['client','client'],['tech','tech'],['date-debut','date_debut'],['date-fin','date_fin']].forEach(([id,k])=>{
      const e=document.getElementById('f-'+id);if(e)e.addEventListener('input',ev=>S.info[k]=ev.target.value);
    });
  }
  if(S.step===3){
    const sn=document.getElementById('f-signame');if(sn)sn.addEventListener('input',e=>S.sig.name=e.target.value);
    setTimeout(initSig,50);
  }
}
function go(step){
  if(S.step===3){const sn=document.getElementById('f-signame');if(sn)S.sig.name=sn.value;if(sc)S.sig.url=sc.toDataURL();}
  S.step=step;R();window.scrollTo(0,0);
}

// ── GENERATE ──
async function generate(){
  if(!S.resp){alert('Veuillez sélectionner le responsable du rapport.');return;}
  const sn=document.getElementById('f-signame');if(sn)S.sig.name=sn.value;
  if(sc)S.sig.url=sc.toDataURL();
  const btn=document.getElementById('btn-gen');
  if(btn){btn.textContent='⏳ Génération PDF...';btn.disabled=true;}
  try{await buildAndSharePDF();}
  catch(e){alert('Erreur : '+e.message);}
  finally{if(btn){btn.textContent='📱 Générer & Envoyer WhatsApp';btn.disabled=false;}}
}

// ── PDF ──
async function buildAndSharePDF(){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF('p','mm','a4');
  const PW=210,PH=297,M=14;let y=0;
  const c=S.info,sig=S.sig;
  const resp=EQUIPE.find(x=>x.id===S.resp)||{nom:'—',tel:''};
  const fd=d=>{if(!d)return'—';const[yy,mm,dd]=d.split('-');return`${dd}/${mm}/${yy}`;};
  const YEL=[245,196,0],DRK=[30,45,53],WHT=[255,255,255],GRY=[100,116,139],LGT=[248,250,252],BRD=[226,232,240],OV=[124,58,237];
  const set=(fill,draw,tc)=>{if(fill)doc.setFillColor(...fill);if(draw)doc.setDrawColor(...draw);if(tc)doc.setTextColor(...tc);};

  // HEADER
  set(DRK);doc.rect(0,0,PW,30,'F');set(YEL);doc.rect(0,28,PW,2,'F');set(null,null,WHT);
  doc.setFontSize(18);doc.setFont('helvetica','bold');doc.text("CHOK'BETON",M,12);
  doc.setFontSize(8);doc.setFont('helvetica','normal');doc.text('Découpe béton · Sciage · Renforcement structures',M,18);
  doc.setFontSize(14);doc.setFont('helvetica','bold');doc.text('RAPPORT DE CHANTIER',PW-M,12,{align:'right'});
  doc.setFontSize(8);doc.setFont('helvetica','normal');doc.text(`N° ${c.num||'—'}`,PW-M,18,{align:'right'});
  y=35;

  const iw=(PW-2*M-3)/2;
  [[{l:'DATE RAPPORT',v:fd(c.date)},{l:'RESPONSABLE',v:resp.nom}],
   [{l:'DEBUT CHANTIER',v:fd(c.date_debut)},{l:'FIN CHANTIER',v:fd(c.date_fin)}],
   [{l:'TECHNICIEN',v:c.tech||'—'},{l:'CLIENT',v:c.client||'—'}],
   [{l:'CHANTIER / ADRESSE',v:c.addr||'—',full:true}]
  ].forEach(row=>{
    row.forEach((item,i)=>{
      const x=M+i*(iw+3),w=item.full?(PW-2*M):iw;
      set(LGT,BRD);doc.roundedRect(x,y,w,12,.5,.5,'FD');
      doc.setFontSize(6.5);doc.setFont('helvetica','bold');set(null,null,GRY);doc.text(item.l,x+3,y+4.5);
      doc.setFontSize(9);doc.setFont('helvetica','bold');set(null,null,DRK);doc.text(String(item.v||'—').substring(0,55),x+3,y+9.5);
    });y+=13.5;
  });y+=4;

  const secTitle=title=>{
    if(y>PH-30){doc.addPage();y=15;}
    set(null,null,DRK);doc.setFontSize(9);doc.setFont('helvetica','bold');doc.text(title,M,y);
    set(YEL);doc.rect(M,y+1,PW-2*M,1,'F');y+=7;
  };

  secTitle('TRAVAUX RÉALISÉS PAR NIVEAU');
  if(!S.blocs.length){set(null,null,GRY);doc.setFontSize(9);doc.setFont('helvetica','italic');doc.text('Aucune prestation enregistrée',M,y+5);y+=12;}

  S.blocs.forEach((b,bi)=>{
    const lines=[];
    (b.carottages||[]).forEach(l=>{
      const dLbl=l.diam==='Autre'?(l.diamCustom?`Ø ${l.diamCustom} mm`:'Ø ? mm'):`Ø ${l.diam} mm`;
      if(l.nb>0) lines.push({txt:`${l.nb} carottage${l.nb>1?'s':''} — ${dLbl}${l.ep?' — Ép. '+l.ep+' cm':''}${l.supp==='voile'&&l.haut?' — H. '+l.haut+' ml':''}`,supp:l.supp});
    });
    (b.sciages||[]).forEach(l=>{lines.push({txt:`Sciage — ${l.ml} ml${l.prof?' — Prof. '+l.prof+' cm':''}${l.supp==='voile'&&l.haut?' — H. '+l.haut+' ml':''}`,supp:l.supp});});
    (b.carbones||[]).forEach(l=>{lines.push({txt:`${l.nbl} lamelle(s) × ${l.ll} ml${l.type?' — '+l.type:''} — ${l.ori}`});});
    (b.ouvertures||[]).forEach(o=>{
      lines.push({txt:`OUVERTURE ${o.larg||'?'}×${o.long||'?'} cm${o.haut?' — H. '+o.haut+' ml':''}`,ouv:true});
      (o.carottages||[]).filter(c=>c.nb>0).forEach(c=>{
        const dLbl=c.diam==='Autre'?(c.diamCustom?`Ø ${c.diamCustom} mm`:'Ø ? mm'):`Ø ${c.diam} mm`;
        lines.push({txt:`   ↳ ${c.nb} carottage${c.nb>1?'s':''} — ${dLbl}${c.ep?' — Ép. '+c.ep+' cm':''}`,sub:true});
      });
    });
    if(b.autres) doc.splitTextToSize(b.autres,PW-2*M-16).forEach(t=>lines.push({txt:t}));
    if(b.obs)   lines.push({txt:`Obs. : ${b.obs}`,obs:true});

    const boxH=9+lines.length*6+3;
    if(y+boxH>PH-20){doc.addPage();y=15;}
    set(DRK);doc.roundedRect(M,y,PW-2*M,9,1,1,'F');
    set(YEL);doc.roundedRect(M+2,y+1.5,22,6,1,1,'F');
    doc.setFontSize(8);doc.setFont('helvetica','bold');set(null,null,DRK);doc.text(b.niveau||'—',M+13,y+6,{align:'center'});
    set(null,null,WHT);doc.text(`${bi+1}. Niveau ${b.niveau||'—'}`,M+27,y+6);
    y+=9;
    set(WHT,BRD);doc.rect(M,y,PW-2*M,lines.length*6+3,'FD');
    lines.forEach((l,li)=>{
      const tx=y+3+li*6+4;
      if(l.supp){
        const bg=l.supp==='plancher'?[254,243,199]:[224,242,254];
        const tc=l.supp==='plancher'?[146,64,14]:[3,105,161];
        set(bg,null);doc.roundedRect(PW-M-22,tx-3.5,20,5,.5,.5,'F');
        doc.setFontSize(6);doc.setFont('helvetica','bold');set(null,null,tc);
        doc.text(l.supp==='plancher'?'Plancher':'Voile',PW-M-12,tx,{align:'center'});
      }
      if(l.ouv){set(null,null,OV);doc.setFont('helvetica','bold');}
      else if(l.sub){set(null,null,GRY);doc.setFont('helvetica','normal');}
      else if(l.obs){set(null,null,GRY);doc.setFont('helvetica','italic');}
      else{set(null,null,[40,40,40]);doc.setFont('helvetica','normal');}
      doc.setFontSize(8);doc.text(l.txt,M+4,tx);
    });
    y+=lines.length*6+3+4;
  });y+=3;

  // RECAP
  secTitle('RÉCAPITULATIF');
  let totCar=0,totSci=0,totCb=0,totOuv=0;
  S.blocs.forEach(b=>{
    (b.carottages||[]).forEach(l=>totCar+=parseInt(l.nb||0));
    (b.sciages||[]).forEach(l=>totSci+=parseFloat(l.ml||0));
    (b.carbones||[]).forEach(l=>totCb+=parseInt(l.nbl||0));
    totOuv+=(b.ouvertures||[]).length;
  });
  const rr=[];
  if(totCar>0) rr.push(['Carottage',`${S.blocs.filter(b=>(b.carottages||[]).length>0).length} niveau(x)`,`${totCar} carottage(s)`]);
  if(totSci>0) rr.push(['Sciage',`${S.blocs.filter(b=>(b.sciages||[]).length>0).length} niveau(x)`,`${totSci} ml`]);
  if(totCb>0)  rr.push(['Lamelles carbone',`${S.blocs.filter(b=>(b.carbones||[]).length>0).length} niveau(x)`,`${totCb} lamelle(s)`]);
  if(totOuv>0) rr.push(['Ouvertures par carottages',`${S.blocs.filter(b=>(b.ouvertures||[]).length>0).length} niveau(x)`,`${totOuv} ouverture(s)`]);
  if(rr.length){
    const cx=[M,M+80,M+155];
    set(LGT,BRD);doc.rect(M,y,PW-2*M,7,'FD');
    ['Prestation','Niveaux','Total'].forEach((h,i)=>{doc.setFontSize(7);doc.setFont('helvetica','bold');set(null,null,GRY);doc.text(h.toUpperCase(),cx[i]+3,y+4.8);});
    y+=7;
    rr.forEach(row=>{
      if(y>PH-25){doc.addPage();y=15;}
      set(WHT,BRD);doc.rect(M,y,PW-2*M,8,'FD');
      row.forEach((cell,i)=>{doc.setFontSize(9);doc.setFont('helvetica','normal');set(null,null,DRK);doc.text(cell,cx[i]+3,y+5.5);});y+=8;
    });y+=5;
  }

  // PHOTOS
  if(S.photos.length>0){
    doc.addPage();y=15;secTitle('PHOTOS DU CHANTIER');
    const iw2=(PW-2*M-5)/2,ih=iw2*0.7;let col=0;
    for(let i=0;i<S.photos.length;i++){
      if(y+ih+10>PH-20){doc.addPage();y=15;}
      const x=M+col*(iw2+5);
      try{doc.addImage(S.photos[i].url,'JPEG',x,y,iw2,ih);set(null,BRD);doc.rect(x,y,iw2,ih,'S');
        if(S.photos[i].caption){set(LGT);doc.rect(x,y+ih-6,iw2,6,'F');doc.setFontSize(7);doc.setFont('helvetica','normal');set(null,null,DRK);doc.text(S.photos[i].caption.substring(0,40),x+2,y+ih-1.5);}
      }catch(e){}
      col++;if(col>=2){col=0;y+=ih+8;}
    }if(col>0)y+=ih+8;y+=4;
  }

  // SIGNATURE
  if(y>PH-65){doc.addPage();y=15;}
  secTitle('VALIDATION CLIENT — BON POUR ACCORD');
  set(WHT,BRD);doc.roundedRect(M,y,PW-2*M,52,1,1,'FD');
  doc.setFontSize(10);doc.setFont('helvetica','bold');set(null,null,DRK);doc.text(`Signataire : ${sig.name||'—'}`,PW/2,y+8,{align:'center'});
  doc.setFontSize(8);doc.setFont('helvetica','normal');set(null,null,GRY);doc.text('Lu et approuvé — Bon pour accord des travaux réalisés',PW/2,y+14,{align:'center'});
  if(sig.url){try{doc.addImage(sig.url,'PNG',PW/2-30,y+17,60,25);}catch(e){}}
  else{set(null,BRD);doc.setLineDashPattern([2,2],0);doc.rect(PW/2-35,y+17,70,25,'S');doc.setLineDashPattern([],0);set(null,null,GRY);doc.setFontSize(8);doc.text('Signature non renseignée',PW/2,y+31,{align:'center'});}
  set(null,null,GRY);doc.setFontSize(8);doc.text(`Date : ${fd(c.date)}`,PW/2,y+46,{align:'center'});

  const total=doc.getNumberOfPages();const now=new Date();
  for(let p=1;p<=total;p++){
    doc.setPage(p);set(YEL);doc.rect(M,PH-13,PW-2*M,.8,'F');
    doc.setFontSize(7);doc.setFont('helvetica','normal');set(null,null,GRY);
    doc.text(`Rapport généré le ${now.toLocaleDateString('fr-FR')} à ${now.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})} · CHOK'BETON · Responsable : ${resp.nom} · N°${c.num||'—'} · Page ${p}/${total}`,PW/2,PH-8,{align:'center'});
  }

  const filename=`rapport-chokbeton-${c.date||'chantier'}-${(c.num||'001').replace(/[^a-zA-Z0-9]/g,'_')}.pdf`;
  const blob=doc.output('blob');const file=new File([blob],filename,{type:'application/pdf'});
  const msg=`Rapport CHOK'BETON\nChantier : ${c.addr||'—'}\nDate : ${fd(c.date)}\nN° : ${c.num||'—'}\nTechnicien : ${c.tech||'—'}`;
  if(navigator.canShare&&navigator.canShare({files:[file]})){await navigator.share({files:[file],title:"Rapport CHOK'BETON",text:msg});return;}
  doc.save(filename);
  const waUrl=resp.tel&&resp.tel!=='33XXXXXXXXX'?`https://wa.me/${resp.tel}?text=${encodeURIComponent(msg+'\n\n(PDF téléchargé)')}`:`https://wa.me/?text=${encodeURIComponent(msg)}`;
  setTimeout(()=>window.open(waUrl,'_blank'),800);
  alert(`✅ PDF téléchargé !\nWhatsApp va s'ouvrir.\nJoignez le fichier "${filename}".`);
}

// ── INIT ──
loadState();
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
R();
</script>
</body></html>
