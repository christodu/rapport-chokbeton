.inp-sm{padding:8px;border:1.5px solid var(--brd);border-radius:7px;font-size:14px}
.haut-row{display:flex;align-items:center;gap:7px;margin-top:7px}
.haut-lbl{font-size:12px;font-weight:700;color:var(--mut);white-space:nowrap}
.haut-inp{flex:1;padding:7px;border:1.5px solid #0284c7;border-radius:7px;font-size:14px;background:#f0f9ff}

.ouvc-row{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.srow{display:flex;gap:9px}
.sb{flex:1;padding:11px;border:2px solid var(--brd);border-radius:8px;background:#fff;font-size:14px;font-weight:700;cursor:pointer;text-align:center;transition:all .12s}
.sb.sel{border-color:var(--dk);background:var(--y);color:var(--dk)}
#sigc{width:100%;height:160px;border:2px solid var(--brd);border-radius:8px;touch-action:none;background:#fafafa;display:block;cursor:crosshair}

.empty .e-ico{font-size:44px;margin-bottom:10px}
.info-box{background:#f0fdf4;border:1px solid #86efac;border-radius:8px;padding:11px 13px;font-size:13px;color:#166534}

.ph-del{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.65);color:#fff;border:none;border-radius:50%;width:22px;height:22px;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center}

<body>
<div class="app" id="app"></div>
<div class="ov-bg" id="ov"><div class="modal" id="modal"></div></div>
<script>
// ── CONFIG ──
var EQUIPE=[
  {id:'christopher',nom:'Christopher',tel:'33XXXXXXXXX'},
  {id:'christian',  nom:'Christian',  tel:'33XXXXXXXXX'},
  {id:'ghislain',   nom:'Ghislain',   tel:'33XXXXXXXXX'}
];
var NIVEAUX=['SS3','SS2','SS1','RDC','RDJ','R+1','R+2','R+3','R+4','R+5','R+6','R+7','R+8','R+9','R+10','Toiture'];
var DIAMS=[40,50,60,70,80,100,110,120,130,150,160,200,220,250,300,320,350,400,'Autre'];
var CB_TYPES=['S512','S812','S1012','S1512','WRAP'];
function LOGO(h){h=h||42;var pts=Array.from({length:28},function(_,i){var a=i*360/28,c=function(x){return Math.cos(x*Math.PI/180);},s=function(y){return Math.sin(y*Math.PI/180);};return '<polygon points="'+76*c(a-4)+','+76*s(a-4)+' '+88*c(a)+','+88*s(a)+' '+76*c(a+4)+','+76*s(a+4)+'" fill="#F5C400"/>';}).join('');return '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 240" height="'+h+'"><g transform="translate(110,100)"><circle cx="0" cy="0" r="76" fill="#F5C400"/>'+pts+'<rect x="-28" y="-32" width="56" height="64" rx="3" fill="#1E2D35"/><polygon points="-20,-24 20,-24 20,-14 -8,14 20,14 20,24 -20,24 -20,14 8,-14 -20,-14" fill="white"/><polygon points="0,-24 20,-24 20,-14 0,-14" fill="#1E2D35"/><polygon points="-20,14 0,14 0,24 -20,24" fill="#1E2D35"/></g><text x="110" y="200" text-anchor="middle" font-family="Arial Black,sans-serif" font-weight="900" font-size="26" fill="#1E2D35" letter-spacing="1">CHOK\'BETON</text><rect x="20" y="212" width="180" height="4" rx="2" fill="#F5C400"/></svg>';}

// ── FACTORIES ──
function newCar(){return {diam:100,nb:1,ep:'',supp:'',haut:'',diamCustom:'',etai:false,cp:false,polyane:false};}
function newSci(){return {ml:'',prof:'',supp:'',haut:'',etai:false,cp:false,polyane:false};}
function newCb(){return {type:'',nbl:'',ll:'',ori:'horizontal',polyane:false};}
function newOuv(){return {larg:'',long:'',supp:'',haut:'',etai:false,cp:false,polyane:false,carottages:[{diam:200,nb:1,ep:'',diamCustom:''}]};}

// ── STATE ──
var S={
  step:1,
  info:{date:new Date().toISOString().slice(0,10),num:'',addr:'',client:'',tech:'',date_debut:'',date_fin:''},
  blocs:[],resp:'',photos:[],
  sig:{url:'',name:''},
  m:{open:false,editId:null,niveau:'',obs:'',carottages:[],sciages:[],carbones:[],ouvertures:[],autres:''}
};
var uid=1,sc,sx,drawing=false;

// ── PERSISTENCE ──
function saveState(){try{localStorage.setItem('cb_rapport',JSON.stringify({info:S.info,blocs:S.blocs,resp:S.resp,sig:{name:S.sig.name},step:S.step}));}catch(e){}}
function loadState(){try{var d=localStorage.getItem('cb_rapport');if(!d)return;var p=JSON.parse(d);if(p.info)Object.assign(S.info,p.info);if(p.blocs)S.blocs=p.blocs;if(p.resp)S.resp=p.resp;if(p.sig&&p.sig.name)S.sig.name=p.sig.name;if(p.step)S.step=p.step;var mx=S.blocs.reduce(function(a,b){return Math.max(a,parseInt(b.id)||0);},0);uid=mx+1;}catch(e){}}
function resetState(){if(!confirm('Démarrer un nouveau rapport ?\nLe rapport actuel sera effacé.'))return;localStorage.removeItem('cb_rapport');location.reload();}

// ── HISTORIQUE DES RAPPORTS ──
function saveToHistory(filename,c,resp,blocs,sig,photos){
  try{
    var hist=JSON.parse(localStorage.getItem('cb_historique')||'[]');
    hist.unshift({
      id:Date.now(),
      filename:filename,
      date:c.date,
      num:c.num||'—',
      addr:c.addr||'—',
      client:c.client||'—',
      tech:c.tech||'—',
      resp:resp.nom||'—',
      niveaux:blocs.length,
      createdAt:new Date().toISOString(),
      // Données complètes pour régénération
      fullData:{
        info:JSON.parse(JSON.stringify(c)),
        blocs:JSON.parse(JSON.stringify(blocs)),
        sig:{name:sig.name,url:sig.url||''},
        photos:JSON.parse(JSON.stringify(photos||[]))
      }
    });
    if(hist.length>30)hist=hist.slice(0,30);
    localStorage.setItem('cb_historique',JSON.stringify(hist));
  }catch(e){console.warn('Historique trop volumineux, sauvegarde sans photos:',e);
    // Fallback sans photos si trop volumineux
    try{
      var hist2=JSON.parse(localStorage.getItem('cb_historique')||'[]');
      hist2.unshift({id:Date.now(),filename:filename,date:c.date,num:c.num||'—',addr:c.addr||'—',client:c.client||'—',tech:c.tech||'—',resp:resp.nom||'—',niveaux:blocs.length,createdAt:new Date().toISOString(),
        fullData:{info:JSON.parse(JSON.stringify(c)),blocs:JSON.parse(JSON.stringify(blocs)),sig:{name:sig.name,url:''},photos:[]}
      });
      if(hist2.length>30)hist2=hist2.slice(0,30);
      localStorage.setItem('cb_historique',JSON.stringify(hist2));
    }catch(e2){}
  }
}
function loadHistory(){
  try{return JSON.parse(localStorage.getItem('cb_historique')||'[]');}catch(e){return [];}
}
function deleteHistory(id){
  try{var hist=loadHistory().filter(function(r){return r.id!==id;});localStorage.setItem('cb_historique',JSON.stringify(hist));}catch(e){}
}
function clearHistory(){
  if(!confirm('Supprimer tout l\'historique ?'))return;
  localStorage.removeItem('cb_historique');
  showHistory();
}

var histOpen=false;
function toggleHistory(){histOpen=!histOpen;showHistory();}

function showHistory(){
  var el=document.getElementById('hist-panel');
  if(!el)return;
  if(!histOpen){el.style.display='none';return;}
  el.style.display='block';
  var hist=loadHistory();
  if(!hist.length){el.innerHTML='<div style="text-align:center;padding:24px;color:var(--mut);font-size:14px">Aucun rapport enregistré</div>';return;}
  function fd(d){if(!d)return'—';var p=d.split('-');return p[2]+'/'+p[1]+'/'+p[0];}
  el.innerHTML='<div style="padding:12px 14px;border-bottom:1px solid var(--brd);display:flex;justify-content:space-between;align-items:center">'
    +'<span style="font-size:13px;font-weight:800;color:var(--dk)">'+hist.length+' rapport(s)</span>'
    +'<button onclick="clearHistory()" style="background:none;border:none;color:#ef4444;font-size:12px;font-weight:700;cursor:pointer">🗑 Tout effacer</button>'
    +'</div>'
    +hist.map(function(r){
      return '<div style="padding:12px 14px;border-bottom:1px solid var(--brd)">'
        +'<div style="display:flex;align-items:flex-start;gap:10px">'
        +'<div style="flex:1;min-width:0">'
        +'<div style="font-size:13px;font-weight:800;color:var(--dk);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">N°'+r.num+' — '+r.addr+'</div>'
        +'<div style="font-size:12px;color:var(--mut);margin-top:2px">'+fd(r.date)+' · '+r.client+' · '+r.resp+'</div>'
        +'<div style="font-size:11px;color:var(--mut);margin-top:1px">'+r.niveaux+' niveau(x) · '+r.tech+'</div>'
        +'</div>'
        +'<button onclick="deleteHistEntry('+r.id+')" style="background:none;border:none;color:#ef4444;font-size:18px;cursor:pointer;flex-shrink:0;padding:2px">🗑</button>'
        +'</div>'
        +'<div style="display:flex;gap:8px;margin-top:9px">'
        +'<button onclick="regenPDF('+r.id+')" style="flex:1;padding:8px;background:var(--dk);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer">📄 Régénérer PDF</button>'
        +'<button onclick="restoreReport('+r.id+')" style="flex:1;padding:8px;background:var(--y);color:var(--dk);border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer">✏️ Modifier</button>'
        +'</div>'
        +'</div>';
    }).join('');
}

function deleteHistEntry(id){deleteHistory(id);showHistory();}

function restoreReport(id){
  if(!confirm('Charger ce rapport ?\nLe rapport en cours sera remplacé.'))return;
  var hist=loadHistory();
  var r=hist.find(function(x){return x.id===id;});
  if(!r||!r.fullData){alert('Données introuvables.');return;}
  Object.assign(S.info,r.fullData.info);
  S.blocs=JSON.parse(JSON.stringify(r.fullData.blocs));
  S.sig={name:r.fullData.sig.name,url:r.fullData.sig.url||''};
  S.photos=JSON.parse(JSON.stringify(r.fullData.photos||[]));
  S.resp='';
  S.step=1;
  histOpen=false;
  saveState();
  R();
  alert('Rapport chargé ! Vous pouvez le modifier et le régénérer.');
}

async function regenPDF(id){
  var hist=loadHistory();
  var r=hist.find(function(x){return x.id===id;});
  if(!r||!r.fullData){alert('Données introuvables.');return;}
  // Trouver le responsable
  var respObj=EQUIPE.find(function(e){return e.nom===r.resp;})||{nom:r.resp,tel:''};
  var btn=event.target;if(btn){btn.textContent='⏳...';btn.disabled=true;}
  try{
    await buildPDFFromData(r.fullData.info,r.fullData.blocs,r.fullData.sig,r.fullData.photos||[],respObj,r.filename);
  }catch(e){alert('Erreur : '+e.message);}
  finally{if(btn){btn.textContent='📄 Régénérer PDF';btn.disabled=false;}}
}
function togCarEtai(i){if(S.m.carottages[i]){saveModalFields();S.m.carottages[i].etai=!S.m.carottages[i].etai;renderModal();}}
function togCarCp(i){if(S.m.carottages[i]){saveModalFields();S.m.carottages[i].cp=!S.m.carottages[i].cp;renderModal();}}
function togCarPoly(i){if(S.m.carottages[i]){saveModalFields();S.m.carottages[i].polyane=!S.m.carottages[i].polyane;renderModal();}}
function togSciEtai(i){if(S.m.sciages[i]){saveModalFields();S.m.sciages[i].etai=!S.m.sciages[i].etai;renderModal();}}
function togSciCp(i){if(S.m.sciages[i]){saveModalFields();S.m.sciages[i].cp=!S.m.sciages[i].cp;renderModal();}}
function togSciPoly(i){if(S.m.sciages[i]){saveModalFields();S.m.sciages[i].polyane=!S.m.sciages[i].polyane;renderModal();}}
function togCbPoly(i){if(S.m.carbones[i]){saveModalFields();S.m.carbones[i].polyane=!S.m.carbones[i].polyane;renderModal();}}
function togOuvEtai(i){if(S.m.ouvertures[i]){saveModalFields();S.m.ouvertures[i].etai=!S.m.ouvertures[i].etai;renderModal();}}
function togOuvCp(i){if(S.m.ouvertures[i]){saveModalFields();S.m.ouvertures[i].cp=!S.m.ouvertures[i].cp;renderModal();}}
function togOuvPoly(i){if(S.m.ouvertures[i]){saveModalFields();S.m.ouvertures[i].polyane=!S.m.ouvertures[i].polyane;renderModal();}}

// ── TOGGLE BUTTON HTML ──
function togBtn(on,fn,label,col,bg,fg){
  return '<div onclick="'+fn+'" style="padding:10px 14px;border:2px solid '+(on?col:'var(--brd)')+';border-radius:8px;background:'+(on?bg:'#fff')+';font-size:14px;font-weight:700;cursor:pointer;color:'+(on?fg:'var(--mut)')+';display:flex;align-items:center;gap:10px;margin-top:7px;-webkit-tap-highlight-color:transparent">'
    +'<span style="font-size:18px;flex-shrink:0">'+(on?'✅':'☐')+'</span>'
    +'<span>'+label+'</span>'
    +'</div>';
}
function togGrn(on,fn,label){return togBtn(on,fn,label,'#16a34a','#f0fdf4','#166534');}
function togBlu(on,fn,label){return togBtn(on,fn,label,'#0284c7','#e0f2fe','#0369a1');}

// ── RENDER ──
function R(){document.getElementById('app').innerHTML=hdr()+content()+bot();events();saveState();}

function hdr(){
  var labs=['','Infos Chantier','Travaux par niveau','Photos & Signature'];
  return '<div class="hdr"><div class="hdr-row">'
    +'<div style="height:38px;display:flex;align-items:center">'+LOGO(38)+'</div>'
    +'<div class="hdr-info"><div style="display:flex;align-items:center;justify-content:space-between">'
    +'<div class="hdr-title">Rapport de Chantier</div>'
    +'<div style="display:flex;gap:6px">'
    +'<button onclick="toggleHistory()" style="background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:7px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer">📋 Historique</button>'
    +'<button onclick="resetState()" style="background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:7px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer">✚ Nouveau</button>'
    +'</div>'
    +'</div><div class="hdr-step">'+labs[S.step]+' — Étape '+S.step+'/3</div></div>'
    +'</div><div class="steps-bar">'
    +[1,2,3].map(function(i){return '<div class="sd '+(i<S.step?'was':'')+(i===S.step?' on':'')+'"></div>';}).join('')
    +'</div></div>'
    // Panneau historique (caché par défaut)
    +'<div id="hist-panel" style="display:none;background:#fff;border-bottom:2px solid var(--brd);max-height:50vh;overflow-y:auto;box-shadow:0 4px 12px rgba(0,0,0,.15)"></div>';
}
function content(){return '<div class="body">'+(S.step===1?step1():S.step===2?step2():step3())+'</div>';}

// ── STEP 1 ──
function step1(){
  var c=S.info;
  return '<div class="card"><div class="ct">📅 Informations générales</div>'
    +'<div class="f"><label>Date du rapport</label><input type="date" id="f-date" value="'+c.date+'"></div>'
    +'<div class="f"><label>N° de rapport</label><input type="text" id="f-num" value="'+c.num+'" placeholder="Ex : 2025-001"></div>'
    +'<div class="row"><div class="f"><label>Début chantier</label><input type="date" id="f-date-debut" value="'+c.date_debut+'"></div>'
    +'<div class="f"><label>Fin chantier</label><input type="date" id="f-date-fin" value="'+c.date_fin+'"></div></div>'
    +'</div><div class="card"><div class="ct">📍 Chantier</div>'
    +'<div class="f"><label>Adresse / Nom du chantier</label><input type="text" id="f-addr" value="'+c.addr+'" placeholder="12 rue de la Paix, Paris"></div>'
    +'<div class="f"><label>Client</label><input type="text" id="f-client" value="'+c.client+'" placeholder="Nom du client"></div>'
    +'</div><div class="card"><div class="ct">👷 Intervenant</div>'
    +'<div class="f"><label>Nom du technicien</label><input type="text" id="f-tech" value="'+c.tech+'" placeholder="Prénom Nom"></div>'
    +'</div>';
}

// ── STEP 2 ──
function dLbl(d,dc){return d==='Autre'?(dc?'Ø'+dc+'mm':'Ø?mm'):'Ø'+d+'mm';}
function protBadges(item){
  var b='';
  if(item.etai)b+=' <span class="badge bg">🪵 Étai</span>';
  if(item.cp)b+=' <span class="badge bg">🪵 Ferm.CP</span>';
  if(item.polyane)b+=' <span class="badge bpoly">🛡️ Polyane</span>';
  return b;
}

function step2(){
  if(!S.blocs.length)return '<div class="empty"><div class="e-ico">🏗️</div><p>Aucun niveau saisi.<br>Appuyez sur <strong>+ Ajouter un niveau</strong>.</p></div>';
  return S.blocs.map(function(b){return blocHtml(b);}).join('');
}

function blocHtml(b){
  var rows=[];
  (b.carottages||[]).forEach(function(l){
    var sup=l.supp==='plancher'?'<span class="badge bp">Plancher</span>':'<span class="badge bv">Voile</span>';
    var hi=l.supp==='voile'&&l.haut?' ↕'+l.haut+'ml':'';
    rows.push('<div class="work-row"><span class="work-ico">🔩</span><div class="work-txt"><b>'+l.nb+'×</b> '+dLbl(l.diam,l.diamCustom)+(l.ep?' ép.'+l.ep+'cm':'')+hi+' '+sup+protBadges(l)+'</div></div>');
  });
  (b.sciages||[]).forEach(function(l){
    var sup=l.supp==='plancher'?'<span class="badge bp">Plancher</span>':'<span class="badge bv">Voile</span>';
    var hi=l.supp==='voile'&&l.haut?' ↕'+l.haut+'ml':'';
    rows.push('<div class="work-row"><span class="work-ico">🪚</span><div class="work-txt"><b>'+l.ml+'ml</b>'+(l.prof?' prof.'+l.prof+'cm':'')+hi+' '+sup+protBadges(l)+'</div></div>');
  });
  (b.carbones||[]).forEach(function(l){
    rows.push('<div class="work-row"><span class="work-ico">🏗️</span><div class="work-txt"><b>'+l.nbl+' lam.</b> ×'+l.ll+'ml'+(l.type?' '+l.type:'')+' '+l.ori+(l.polyane?' <span class="badge bpoly">🛡️ Polyane</span>':'')+'</div></div>');
  });
  (b.ouvertures||[]).forEach(function(o){
    var sup=o.supp==='plancher'?'<span class="badge bp">Plancher</span>':o.supp==='voile'?'<span class="badge bv">Voile</span>':'';
    var hi=o.supp==='voile'&&o.haut?' ↕'+o.haut+'ml':'';
    var dim=o.larg&&o.long?o.larg+'×'+o.long+'cm':'—';
    var cars=(o.carottages||[]).filter(function(c){return c.nb>0;}).map(function(c){return c.nb+'×'+dLbl(c.diam,c.diamCustom)+(c.ep?' ép.'+c.ep+'cm':'');}).join(' / ');
    rows.push('<div class="work-row"><span class="work-ico">🔲</span><div class="work-txt" style="color:var(--ov)"><b>Ouverture '+dim+'</b>'+hi+' '+sup+protBadges(o)+'<br><span style="color:var(--text);font-size:12px">'+cars+'</span></div></div>');
  });
  if(b.autres)rows.push('<div class="work-row"><span class="work-ico">📝</span><div class="work-txt">'+b.autres+'</div></div>');
  if(b.obs)rows.push('<div class="work-row"><span class="work-ico">💬</span><div class="work-txt" style="color:var(--mut)">'+b.obs+'</div></div>');
  var total=(b.carottages||[]).length+(b.sciages||[]).length+(b.carbones||[]).length+(b.ouvertures||[]).length+(b.autres?1:0);
  return '<div class="bloc"><div class="bloc-hdr">'
    +'<span class="bloc-niv">📍 '+(b.niveau||'—')+'</span>'
    +'<span class="bloc-title">'+total+' travaux réalisé'+(total>1?'s':'')+'</span>'
    +'<button class="bloc-del" onclick="editBloc(\''+b.id+'\')" style="font-size:16px;margin-right:2px">✏️</button>'
    +'<button class="bloc-del" onclick="delBloc(\''+b.id+'\')">🗑</button>'
    +'</div><div class="bloc-body">'+(rows.join('')||'<p style="color:var(--mut);font-size:13px">Aucun travail</p>')+'</div></div>';
}

// ── STEP 3 ──
function step3(){
  var blocs=S.blocs,tCar=0,tSci=0,tCb=0,tOuv=0;
  blocs.forEach(function(b){
    (b.carottages||[]).forEach(function(l){tCar+=parseInt(l.nb||0);});
    (b.sciages||[]).forEach(function(l){tSci+=parseFloat(l.ml||0);});
    (b.carbones||[]).forEach(function(l){tCb+=parseInt(l.nbl||0);});
    tOuv+=(b.ouvertures||[]).length;
  });
  var rows=[];
  if(tCar>0)rows.push('🔩 Carottage — '+tCar+' carottage(s)');
  if(tSci>0)rows.push('🪚 Sciage — '+tSci+' ml');
  if(tCb>0)rows.push('🏗️ '+tCb+' lamelle(s) carbone');
  if(tOuv>0)rows.push('🔲 '+tOuv+' ouverture(s)');
  var recap=rows.length?'<p style="font-size:13px;color:var(--mut);margin-bottom:9px">'+blocs.length+' niveau(x)</p>'+rows.map(function(r){return '<div style="font-size:14px;padding:7px 0;border-bottom:1px solid var(--brd)">'+r+'</div>';}).join(''):'<p style="font-size:14px;color:var(--mut)">Aucune prestation</p>';
  var respCards=EQUIPE.map(function(e){return '<div class="rc '+(S.resp===e.id?'sel':'')+'" onclick="selResp(\''+e.id+'\')">'
    +'<div class="rc-av">'+e.nom[0]+'</div>'
    +'<div class="rc-info"><div class="rc-name">'+e.nom+'</div><div class="rc-sub">📱 WhatsApp</div></div>'
    +(S.resp===e.id?'<span style="font-size:20px">✅</span>':'')
    +'</div>';}).join('');
  var photoGrid=S.photos.length?'<div class="photo-grid">'+S.photos.map(function(p,i){return '<div class="photo-item"><img src="'+p.url+'"><button class="ph-del" onclick="delPhoto('+i+')">✕</button><div class="ph-cap"><input type="text" value="'+(p.caption||'')+'" placeholder="Légende..." oninput="S.photos['+i+'].caption=this.value"></div></div>';}).join('')+'</div><p style="font-size:12px;color:var(--mut);margin-top:6px;text-align:center">'+S.photos.length+'/10</p>':'';
  return '<div class="card"><div class="ct">📊 Récapitulatif</div>'+recap+'</div>'
    +'<div class="card"><div class="ct">👷 Responsable</div><div class="rgrid">'+respCards+'</div></div>'
    +'<div class="card"><div class="ct">📸 Photos <span style="font-weight:400;text-transform:none;font-size:10px">(max 10)</span></div>'+photoGrid
    +(S.photos.length<10?'<label class="photo-upload"><input type="file" accept="image/*" multiple onchange="addPhotos(this)"><div style="font-size:32px;margin-bottom:6px">📷</div><div style="font-size:13px;color:var(--mut);font-weight:600">Ajouter des photos</div></label>':'')
    +'</div>'
    +'<div class="card"><div class="ct">✍️ Signature client</div>'
    +'<div class="f"><label>Nom du signataire</label><input type="text" id="f-signame" value="'+S.sig.name+'" placeholder="Prénom Nom"></div>'
    +'<div class="f"><label>Signature</label><canvas id="sigc" width="800" height="300"></canvas>'
    +'<button class="btn btn-o btn-sm" style="margin-top:8px" onclick="clearSig()">🗑 Effacer</button></div></div>'
    +'<div class="info-box">📱 Le PDF sera partagé via WhatsApp au responsable sélectionné</div>';
}

function addPhotos(input){var files=Array.from(input.files),rem=10-S.photos.length,toAdd=files.slice(0,rem),ld=0;toAdd.forEach(function(f){var r=new FileReader();r.onload=function(e){S.photos.push({url:e.target.result,caption:''});if(++ld===toAdd.length)R();};r.readAsDataURL(f);});}
function delPhoto(i){S.photos.splice(i,1);R();}
function selResp(id){var sn=document.getElementById('f-signame');if(sn)S.sig.name=sn.value;if(sc)S.sig.url=sc.toDataURL();S.resp=id;R();}
function delBloc(id){if(!confirm('Supprimer ce niveau ?'))return;S.blocs=S.blocs.filter(function(x){return x.id!==id;});R();}

function bot(){
  if(S.step===1)return '<div class="bot"><button class="btn btn-p" style="flex:1" onclick="go(2)">Continuer → Saisir les travaux</button></div>';
  if(S.step===2)return '<div class="bot"><button class="btn btn-o btn-sm" onclick="go(1)">← Retour</button><button class="btn btn-y" style="flex:1" onclick="openM()">➕ Ajouter un niveau</button><button class="btn btn-p btn-sm" onclick="go(3)">Valider →</button></div>';
  return '<div class="bot"><button class="btn btn-o btn-sm" onclick="go(2)">← Retour</button><button class="btn btn-wa" id="btn-gen" style="flex:1" onclick="generate()">📱 Générer & Envoyer WhatsApp</button></div>';
}

// ── MODAL ──
function openM(){S.m={open:true,editId:null,niveau:'',obs:'',carottages:[],sciages:[],carbones:[],ouvertures:[],autres:''};renderModal();}
function editBloc(id){
  var b=S.blocs.find(function(x){return x.id===id;});if(!b)return;
  S.m={open:true,editId:id,niveau:b.niveau,obs:b.obs||'',autres:b.autres||'',
    carottages:JSON.parse(JSON.stringify(b.carottages||[])),
    sciages:JSON.parse(JSON.stringify(b.sciages||[])),
    carbones:JSON.parse(JSON.stringify(b.carbones||[])),
    ouvertures:JSON.parse(JSON.stringify(b.ouvertures||[]))};
  renderModal();
}
function closeM(){S.m.open=false;renderModal();}

function dimSelHtml(val,id,chAttr){
  return '<select id="'+id+'" '+chAttr+' style="flex:1;padding:8px;font-size:14px;font-weight:700;border-radius:7px;border:1.5px solid var(--brd)">'
    +DIAMS.map(function(d){return '<option value="'+d+'"'+(val==d?' selected':'')+'>'+(d==='Autre'?'Autre...':d+' mm')+'</option>';}).join('')
    +'</select>';
}

function renderModal(){
  var m=S.m,ov=document.getElementById('ov');
  ov.className='ov-bg'+(m.open?' show':'');
  var modal=document.getElementById('modal');
  if(!m.open){modal.innerHTML='';return;}

  // ── Carottages ──
  var carHtml=(m.carottages||[]).map(function(l,i){
    var dcInp=l.diam==='Autre'?'<input id="car-dc-'+i+'" type="number" placeholder="Ø mm" value="'+(l.diamCustom||'')+'" style="width:72px;padding:8px;border:1.5px solid var(--y);border-radius:7px;font-size:13px;text-align:center;flex-shrink:0">':'';
    var hautRow=l.supp==='voile'?'<div class="haut-row"><span class="haut-lbl">↕ Hauteur (ml)</span><input id="car-h-'+i+'" class="haut-inp" type="number" placeholder="2.80" value="'+(l.haut||'')+'" step="0.1" min="0"></div>':'';
    var opts='';
    if(l.supp==='plancher'){
      opts+=togGrn(l.etai,'togCarEtai('+i+')','🪵 Mise en place d\'un étai');
      opts+=togGrn(l.cp,  'togCarCp('+i+')','🪵 Fermeture contreplaqué (CP)');
      opts+=togBlu(l.polyane,'togCarPoly('+i+')','🛡️ Protection polyane');
    } else if(l.supp==='voile'){
      opts+=togBlu(l.polyane,'togCarPoly('+i+')','🛡️ Protection polyane');
    }
    return '<div class="work-line">'
      +'<div class="line-row">'+dimSelHtml(l.diam,'car-d-'+i,'data-ch="car-diam" data-i="'+i+'"')+dcInp
      +'<div class="counter"><button class="cbtn" data-c="car-nb-" data-i="'+i+'">−</button><input class="cinp" id="car-n-'+i+'" type="number" min="1" value="'+(l.nb||1)+'"><button class="cbtn" data-c="car-nb+" data-i="'+i+'">+</button></div>'
      +'<button class="del-btn" data-c="car-del" data-i="'+i+'">🗑</button></div>'
      +'<div class="line-row"><input id="car-e-'+i+'" class="inp-sm" type="number" placeholder="ép. cm" value="'+(l.ep||'')+'" style="width:90px;flex-shrink:0">'
      +'<div class="mini-supp" style="flex:1">'
      +'<div class="ms '+(l.supp==='plancher'?'sel-p':'')+'" data-c="car-supp" data-i="'+i+'" data-v="plancher">🟫 Plancher</div>'
      +'<div class="ms '+(l.supp==='voile'?'sel-v':'')+'" data-c="car-supp" data-i="'+i+'" data-v="voile">🧱 Voile</div>'
      +'</div></div>'+hautRow+opts+'</div>';
  }).join('');

  // ── Sciages ──
  var sciHtml=(m.sciages||[]).map(function(l,i){
    var hautRow=l.supp==='voile'?'<div class="haut-row"><span class="haut-lbl">↕ Hauteur (ml)</span><input id="sci-h-'+i+'" class="haut-inp" type="number" placeholder="2.80" value="'+(l.haut||'')+'" step="0.1" min="0"></div>':'';
    var opts='';
    if(l.supp==='plancher'){
      opts+=togGrn(l.etai,'togSciEtai('+i+')','🪵 Mise en place d\'un étai');
      opts+=togGrn(l.cp,  'togSciCp('+i+')','🪵 Fermeture contreplaqué (CP)');
      opts+=togBlu(l.polyane,'togSciPoly('+i+')','🛡️ Protection polyane');
    } else if(l.supp==='voile'){
      opts+=togBlu(l.polyane,'togSciPoly('+i+')','🛡️ Protection polyane');
    }
    return '<div class="work-line">'
      +'<div class="line-row"><input id="sci-ml-'+i+'" class="inp-sm" type="number" placeholder="Longueur ml" value="'+(l.ml||'')+'" step="0.1" min="0" style="flex:1"><input id="sci-pr-'+i+'" class="inp-sm" type="number" placeholder="Prof. cm" value="'+(l.prof||'')+'" step="0.5" min="0" style="flex:1"><button class="del-btn" data-c="sci-del" data-i="'+i+'">🗑</button></div>'
      +'<div class="mini-supp"><div class="ms '+(l.supp==='plancher'?'sel-p':'')+'" data-c="sci-supp" data-i="'+i+'" data-v="plancher">🟫 Plancher</div><div class="ms '+(l.supp==='voile'?'sel-v':'')+'" data-c="sci-supp" data-i="'+i+'" data-v="voile">🧱 Voile</div></div>'
      +hautRow+opts+'</div>';
  }).join('');

  // ── Carbones ──
  var cbHtml=(m.carbones||[]).map(function(l,i){
    return '<div class="work-line">'
      +'<div class="line-row"><select id="cb-t-'+i+'" style="flex:1;padding:8px;font-size:14px;font-weight:700;border-radius:7px;border:1.5px solid var(--brd)"><option value="">— Type de lamelle —</option>'+CB_TYPES.map(function(t){return '<option value="'+t+'"'+(l.type===t?' selected':'')+'>'+t+'</option>';}).join('')+'</select><button class="del-btn" data-c="cb-del" data-i="'+i+'">🗑</button></div>'
      +'<div class="line-row"><input id="cb-n-'+i+'" class="inp-sm" type="number" placeholder="Nb lamelles" value="'+(l.nbl||'')+'" min="1" style="flex:1"><input id="cb-l-'+i+'" class="inp-sm" type="number" placeholder="Longueur ml" value="'+(l.ll||'')+'" step="0.1" style="flex:1"></div>'
      +'<div class="srow" style="margin-bottom:4px"><div class="sb '+(l.ori==='horizontal'?'sel':'')+'" data-c="cb-ori" data-i="'+i+'" data-v="horizontal">↔ Horizontal</div><div class="sb '+(l.ori==='vertical'?'sel':'')+'" data-c="cb-ori" data-i="'+i+'" data-v="vertical">↕ Vertical</div></div>'
      +togBlu(l.polyane,'togCbPoly('+i+')','🛡️ Protection polyane')
      +'</div>';
  }).join('');

  // ── Ouvertures ──
  var ouvHtml=(m.ouvertures||[]).map(function(o,i){
    var hautRow=o.supp==='voile'?'<div class="haut-row"><span class="haut-lbl">↕ Hauteur (ml)</span><input id="ouv-h-'+i+'" class="haut-inp" type="number" placeholder="2.80" value="'+(o.haut||'')+'" step="0.1" min="0"></div>':'';
    var opts='';
    if(o.supp==='plancher'){
      opts+=togGrn(o.etai,'togOuvEtai('+i+')','🪵 Mise en place d\'un étai');
      opts+=togGrn(o.cp,  'togOuvCp('+i+')','🪵 Fermeture contreplaqué (CP)');
      opts+=togBlu(o.polyane,'togOuvPoly('+i+')','🛡️ Protection polyane');
    } else if(o.supp==='voile'){
      opts+=togBlu(o.polyane,'togOuvPoly('+i+')','🛡️ Protection polyane');
    }
    var carsHtml=(o.carottages||[]).map(function(c,ci){
      var dcInp=c.diam==='Autre'?'<input id="ouvc-dc-'+i+'-'+ci+'" type="number" placeholder="Ø mm" value="'+(c.diamCustom||'')+'" style="width:58px;padding:6px;border:1.5px solid var(--y);border-radius:7px;font-size:12px;text-align:center">':'';
      return '<div class="ouvc-row">'+dimSelHtml(c.diam,'ouvc-d-'+i+'-'+ci,'data-ch="ouvc-diam" data-i="'+i+'" data-j="'+ci+'"')+dcInp
        +'<div class="counter"><button class="cbtn" data-c="ouvc-nb-" data-i="'+i+'" data-j="'+ci+'">−</button><input class="cinp" id="ouvc-n-'+i+'-'+ci+'" type="number" min="1" value="'+(c.nb||1)+'"><button class="cbtn" data-c="ouvc-nb+" data-i="'+i+'" data-j="'+ci+'">+</button></div>'
        +'<input id="ouvc-e-'+i+'-'+ci+'" class="inp-sm" type="number" placeholder="ép.cm" value="'+(c.ep||'')+'" style="width:60px;flex-shrink:0">'
        +'<button class="del-btn" data-c="ouvc-del" data-i="'+i+'" data-j="'+ci+'">🗑</button></div>';
    }).join('');
    return '<div class="ouv-line">'
      +'<div class="line-row"><span style="font-size:12px;font-weight:800;color:var(--ov);white-space:nowrap">📐 cm</span>'
      +'<input id="ouv-la-'+i+'" class="inp-sm" type="number" placeholder="Larg." value="'+(o.larg||'')+'" style="width:75px;flex-shrink:0">'
      +'<span style="font-weight:900;color:var(--mut);font-size:18px">×</span>'
      +'<input id="ouv-lo-'+i+'" class="inp-sm" type="number" placeholder="Long." value="'+(o.long||'')+'" style="width:75px;flex-shrink:0">'
      +'<button class="del-btn" style="margin-left:auto" data-c="ouv-del" data-i="'+i+'">🗑</button></div>'

// ── SAVE MODAL FIELDS ──
function saveModalFields(){
  var m=S.m;
  function gv(id){var e=document.getElementById(id);return e?e.value:null;}
  var obs=document.getElementById('m-obs');if(obs)m.obs=obs.value;
  var aut=document.getElementById('m-autres');if(aut)m.autres=aut.value;
  (m.carottages||[]).forEach(function(l,i){
    var d=gv('car-d-'+i);if(d)l.diam=d;
    var dc=gv('car-dc-'+i);if(dc!==null)l.diamCustom=dc;
    var n=gv('car-n-'+i);if(n)l.nb=Math.max(1,parseInt(n)||1);
    var e=gv('car-e-'+i);if(e!==null)l.ep=e;
    var h=gv('car-h-'+i);if(h!==null)l.haut=h;
  });
  (m.sciages||[]).forEach(function(l,i){
    var ml=gv('sci-ml-'+i);if(ml)l.ml=ml;
    var pr=gv('sci-pr-'+i);if(pr!==null)l.prof=pr;
    var h=gv('sci-h-'+i);if(h!==null)l.haut=h;
  });
  (m.carbones||[]).forEach(function(l,i){
    var t=gv('cb-t-'+i);if(t!==null)l.type=t;
    var n=gv('cb-n-'+i);if(n)l.nbl=n;
    var ll=gv('cb-l-'+i);if(ll)l.ll=ll;
  });
  (m.ouvertures||[]).forEach(function(o,i){
    var la=gv('ouv-la-'+i);if(la)o.larg=la;
    var lo=gv('ouv-lo-'+i);if(lo)o.long=lo;
    var h=gv('ouv-h-'+i);if(h!==null)o.haut=h;
    (o.carottages||[]).forEach(function(c,ci){
      var d=gv('ouvc-d-'+i+'-'+ci);if(d)c.diam=d;
      var dc=gv('ouvc-dc-'+i+'-'+ci);if(dc!==null)c.diamCustom=dc;
      var n=gv('ouvc-n-'+i+'-'+ci);if(n)c.nb=Math.max(1,parseInt(n)||1);
      var e=gv('ouvc-e-'+i+'-'+ci);if(e!==null)c.ep=e;
    });
  });
}

// ── EVENT DELEGATION (boutons structurels uniquement) ──
function initModalEvents(){
  var modal=document.getElementById('modal');
  var ov=document.getElementById('ov');
  ov.addEventListener('click',function(e){if(e.target===this)closeM();});
  modal.addEventListener('click',function(e){
    var el=e.target.closest('[data-c]');
    if(!el)return;
    e.stopPropagation();
    saveModalFields();
    var c=el.dataset.c,i=parseInt(el.dataset.i||0),j=parseInt(el.dataset.j||0),v=el.dataset.v||'';
    if(c==='close'){closeM();return;}
    if(c==='save'){saveBloc();return;}
    if(c==='niv')S.m.niveau=S.m.niveau===v?'':v;
    else if(c==='car-add')S.m.carottages.push(newCar());
    else if(c==='car-del')S.m.carottages.splice(i,1);
    else if(c==='car-nb+')S.m.carottages[i].nb=Math.max(1,(S.m.carottages[i].nb||1)+1);
    else if(c==='car-nb-')S.m.carottages[i].nb=Math.max(1,(S.m.carottages[i].nb||1)-1);
    else if(c==='car-supp')S.m.carottages[i].supp=v;
    else if(c==='sci-add')S.m.sciages.push(newSci());
    else if(c==='sci-del')S.m.sciages.splice(i,1);
    else if(c==='sci-supp')S.m.sciages[i].supp=v;
    else if(c==='cb-add')S.m.carbones.push(newCb());
    else if(c==='cb-del')S.m.carbones.splice(i,1);
    else if(c==='cb-ori')S.m.carbones[i].ori=v;
    else if(c==='ouv-add')S.m.ouvertures.push(newOuv());
    else if(c==='ouv-del')S.m.ouvertures.splice(i,1);
    else if(c==='ouv-supp')S.m.ouvertures[i].supp=v;
    else if(c==='ouvc-add')(S.m.ouvertures[i].carottages=S.m.ouvertures[i].carottages||[]).push({diam:200,nb:1,ep:'',diamCustom:''});
    else if(c==='ouvc-del')S.m.ouvertures[i].carottages.splice(j,1);
    else if(c==='ouvc-nb+')S.m.ouvertures[i].carottages[j].nb=Math.max(1,(S.m.ouvertures[i].carottages[j].nb||1)+1);
    else if(c==='ouvc-nb-')S.m.ouvertures[i].carottages[j].nb=Math.max(1,(S.m.ouvertures[i].carottages[j].nb||1)-1);
    renderModal();
  });
  modal.addEventListener('change',function(e){
    var el=e.target,ch=el.dataset.ch;if(!ch)return;
    saveModalFields();
    var i=parseInt(el.dataset.i||0),j=parseInt(el.dataset.j||0);
    if(ch==='car-diam'){S.m.carottages[i].diam=el.value;renderModal();}
    else if(ch==='ouvc-diam'){S.m.ouvertures[i].carottages[j].diam=el.value;renderModal();}
    else if(ch==='cb-type')S.m.carbones[i].type=el.value;
  });
}

function saveBloc(){
  saveModalFields();var m=S.m;
  var hasWork=(m.carottages||[]).length>0||(m.sciages||[]).length>0||(m.carbones||[]).length>0||(m.ouvertures||[]).length>0||m.autres;
  if(!hasWork){alert('Ajoutez au moins un travail.');return;}
  for(var i=0;i<(m.carottages||[]).length;i++){if(!m.carottages[i].supp){alert('Choisissez Plancher ou Voile pour chaque carottage.');return;}}
  for(var i=0;i<(m.sciages||[]).length;i++){if(!m.sciages[i].ml){alert('Saisissez la longueur pour chaque sciage.');return;}if(!m.sciages[i].supp){alert('Choisissez Plancher ou Voile pour chaque sciage.');return;}}
  for(var i=0;i<(m.carbones||[]).length;i++){if(!m.carbones[i].nbl||!m.carbones[i].ll){alert('Renseignez nb et longueur pour chaque lamelle.');return;}}
  for(var i=0;i<(m.ouvertures||[]).length;i++){if(!m.ouvertures[i].larg||!m.ouvertures[i].long){alert('Saisissez les dimensions de chaque ouverture.');return;}if(!m.ouvertures[i].supp){alert('Choisissez Plancher ou Voile pour chaque ouverture.');return;}}
  var data={niveau:m.niveau||'Non précisé',obs:m.obs,autres:m.autres,
    carottages:JSON.parse(JSON.stringify(m.carottages)),
    sciages:JSON.parse(JSON.stringify(m.sciages)),
    carbones:JSON.parse(JSON.stringify(m.carbones)),
    ouvertures:JSON.parse(JSON.stringify(m.ouvertures))};
  if(m.editId){var idx=S.blocs.findIndex(function(x){return x.id===m.editId;});if(idx>=0)Object.assign(S.blocs[idx],data);}
  else S.blocs.push(Object.assign({id:String(uid++)},data));
  closeM();R();
}

// ── SIGNATURE ──
function initSig(){
  var cv=document.getElementById('sigc');if(!cv)return;
  sc=cv;sx=cv.getContext('2d');sx.strokeStyle='#1E2D35';sx.lineWidth=3;sx.lineCap='round';sx.lineJoin='round';
  if(S.sig.url){var img=new Image();img.onload=function(){sx.drawImage(img,0,0,cv.width,cv.height);};img.src=S.sig.url;}
  function pos(e){var r=cv.getBoundingClientRect(),sw=cv.width/r.width,sh=cv.height/r.height,s=e.touches?e.touches[0]:e;return{x:(s.clientX-r.left)*sw,y:(s.clientY-r.top)*sh};}
  cv.addEventListener('mousedown',function(e){e.preventDefault();drawing=true;var p=pos(e);sx.beginPath();sx.moveTo(p.x,p.y);});
  cv.addEventListener('mousemove',function(e){if(!drawing)return;e.preventDefault();var p=pos(e);sx.lineTo(p.x,p.y);sx.stroke();});
  cv.addEventListener('mouseup',function(){drawing=false;if(sc)S.sig.url=sc.toDataURL();});
  cv.addEventListener('touchstart',function(e){e.preventDefault();drawing=true;var p=pos(e);sx.beginPath();sx.moveTo(p.x,p.y);},{passive:false});
  cv.addEventListener('touchmove',function(e){if(!drawing)return;e.preventDefault();var p=pos(e);sx.lineTo(p.x,p.y);sx.stroke();},{passive:false});
  cv.addEventListener('touchend',function(){drawing=false;if(sc)S.sig.url=sc.toDataURL();});
}
function clearSig(){if(sc&&sx){sx.clearRect(0,0,sc.width,sc.height);S.sig.url='';}}

function events(){
